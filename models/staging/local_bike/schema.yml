version: 2

models:
  - name: stg_local_bike__brands
    description: "This model contains the name of the brands"
    columns:
      - name: brand_id
        description: "Primary key, unique identifier for each brand."
        tests:
            - unique
            - not_null
      - name: brand_name
        description: "Name of each brand."
        tests:
            - not_null

  - name: stg_local_bike__categories
    description: "This model contains the name of the categories"
    columns:
      - name: category_id
        description: "Primary key, unique identifier for each category."
        tests:
            - unique
            - not_null
      - name: category_name
        description: "Name of each category."
        tests:
            - not_null

  - name: stg_local_bike__stocks
    description: "This model contains the number of stock for each store and product. "
    columns:
      - name: product_store_id
        description: "Primary key, unique identifier for each store and product : generated by concatenating product_id and store_id."
        tests:
            - unique
            - not_null
      - name: store_id
        description: "Foreign key linking the number of stock to the corresponding store."
        tests:
            - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__stores')
                field: store_id
      - name: product_id
        description: "Foreign key linking the number of stock to the corresponding product."
        tests:
            - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__products')
                field: product_id
      - name: stock_to_date
        description: "The number of stock to date."
        tests:
            - not_null

  - name: stg_local_bike__products
    description: "This model contains detailed information about all the products."
    columns:
      - name: product_id
        description: "Primary key, unique identifier for each product."
        tests:
            - unique
            - not_null
      - name: brand_id
        description: "Foreign key linking the products information to the corresponding brand name."
        tests:
            - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__brands')
                field: brand_id
      - name: category_id
        description: "Foreign key linking the products information to the corresponding category name."
        tests:
            - not_null
          - relationships:
              arguments:
                to: ref('stg_local_bike__categories')
                field: category_id
      - name: model_year
        description: "Model year of each product."
        tests:
            - not_null
      - name: std_price
        description: "Standard price of each product."
        tests:
            - not_null



///////////
  - name: stg_local_bike__orders
    description: "This model contains information about orders placed by customers, including the status of each order and shipment date."
    columns:
      - name: order_id
        description: "Primary key, unique identifier for each order."
        tests:
            - unique
            - not_null
      - name: customer_id
        description: "Foreign key linking the order to the user who placed it."
        tests:
            - not_null
          - relationships:
              arguments:
                to: ref('stg_sales_database__user')
                field: user_id
      - name: order_status
        description: "The current status of the order."
        tests:
            - not_null
          - accepted_values:
              arguments: 
                values: ['1', '2', '3', '4']
      - name: order_date
        description: "The date the order was placed."
        tests:
            - not_null
      - name: required_date
        description: "The date the customer wants the delivery."
        tests:
            - not_null
      - name: store_id
        description: "Foreign key linking the order to the corresponding store."
        tests:
          - relationships:
              arguments:
                to: ref('stg_sales_database__stores')
                field: store_id
      - name: staff_id
        description: "Foreign key linking the order to the corresponding staff."
        tests:
          - relationships:
              arguments:
                to: ref('stg_sales_database__staffs')
                field: order_id


  - name: stg_local_bike__order_items
    description: "This model contains information about each item included in an order, including its price, quantity, and shipping cost."
    columns:
      - name: order_item_id
        description: "Primary key, unique identifier for each order item."
        tests:
            - unique
            - not_null
      - name: order_id
        description: "Foreign key linking the order item to the corresponding order."
        tests:
          - relationships:
              arguments:
                to: ref('stg_sales_database__order')
                field: order_id
      - name: total_order_item_amount
        description: "The total amount for this order item, calculated as (price * quantity) + shipping_cost."

  - name: stg_local_bike__staffs
    description: "This model contains information about payments made for orders, including the sequential payment number."
    columns:
      - name: payment_id
        description: "Primary key, unique identifier for each payment: generated by concatenating order_id and payment_sequential."
        tests:
            - unique
            - not_null
      - name: order_id
        description: "Foreign key linking the payment to the corresponding order."
        tests:
          - relationships:
              arguments:
                to: ref('stg_sales_database__order')
                field: order_id



  - name: stg_local_bike__stores
    description: "This model contains information about the sellers who provide the products."
    columns:
      - name: seller_id
        description: "Primary key, unique identifier for each seller."
        tests:
            - unique
            - not_null

  - name: stg_local_bike__customers
    description: "This model contains user-related information, including where they live."
    columns:
      - name: user_id
        description: "Primary key, unique identifier for each user."
        tests:
            - unique
            - not_null
